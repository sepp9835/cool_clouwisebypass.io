<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Google Agenda - Christelijk Gymnasium Sorghvliet</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7fff6e;
      --accent2: #6edfff;
      --text: #e8e8f0;
      --muted: #555570;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .go-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s, transform 0.15s;
      overflow: hidden;
      user-select: none;
    }

    .go-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(127,255,110,0.06), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .go-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
    .go-btn:hover::before { opacity: 1; }
    .go-btn:active { transform: translateY(0); }

    .go-btn-text {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .go-btn-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .go-btn-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .go-btn-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: rgba(127,255,110,0.08);
      border: 1px solid rgba(127,255,110,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .go-btn:hover .go-btn-icon { background: rgba(127,255,110,0.15); }

    .go-btn-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .links-section {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .link-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      transition: border-color 0.15s, background 0.15s;
      overflow: hidden;
      text-decoration: none;
    }

    .link-item:hover {
      border-color: rgba(110,223,255,0.3);
      background: rgba(110,223,255,0.04);
    }

    .link-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      flex-shrink: 0;
      opacity: 0.6;
    }

    .link-url {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      color: var(--muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }

    .link-item:hover .link-url { color: var(--accent2); }

    .link-arrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: transparent;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .link-item:hover .link-arrow { color: rgba(110,223,255,0.5); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.7rem 1.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <span class="title">Christelijk Gymnasium Sorghvliet</span>
    </div>

    <div class="go-btn" id="go_undercover">
      <div class="go-btn-text">
        <span class="go-btn-title">ga undercover</span>
        <span class="go-btn-sub">paste of typ een link → onzichtbaar</span>
      </div>
      <div class="go-btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 8l4 4-4 4M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-label">quick links</span>
      <div class="divider-line"></div>
    </div>

    <div class="links-section">
      <div class="link-item" data-url="https://youtube.com/">
        <div class="link-dot"></div>
        <span class="link-url">https://youtube.com/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://www.crazygames.com/">
        <div class="link-dot"></div>
        <span class="link-url">https://www.crazygames.com/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://rocketgoal.io/#goog_rewarded/">
        <div class="link-dot"></div>
        <span class="link-url">https://rocketgoal.io/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://monkeytype.com/#google_vignette/">
        <div class="link-dot"></div>
        <span class="link-url">https://monkeytype.com/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://tiktok.com/">
        <div class="link-dot"></div>
        <span class="link-url">https://tiktok.com/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://chatgpt.com/">
        <div class="link-dot"></div>
        <span class="link-url">https://chatgpt.com/</span>
        <span class="link-arrow">→</span>
      </div>
      <div class="link-item" data-url="https://google.com/">
        <div class="link-dot"></div>
        <span class="link-url">https://google.com/</span>
        <span class="link-arrow">→</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">opening...</div>

  <script>
    function goUndercover(url) {
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      window.location.href = url;
    }

    document.querySelectorAll('.link-item').forEach(item => {
      item.addEventListener('click', () => {
        window.open(item.dataset.url, '', 'width=1000,height=1000');
      });
    });

    document.getElementById('go_undercover').addEventListener('click', function() {
      let input = prompt("typ een website of paste hem\n('https://youtube.com', etc)");
      if (input && input.trim() !== '') {
        window.open(input.trim(), '', 'width=1000,height=1000');
      }
    });
  </script>
</body>
</html>
